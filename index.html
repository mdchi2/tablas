<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tablas de Multiplicar</title>

<style>
body {
font-family: 'Courier New', Courier, monospace;
background: #0a0a0a;
color: #00ff9d;
margin: 0;
padding: 15px;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}
.container {
width: 100%;
max-width: 420px;
background: #111111;
border: 2px solid #00ff9d;
border-radius: 20px;
padding: 25px 20px;
box-shadow: 0 0 40px rgba(0, 255, 157, 0.3);
text-align: center;
}
h1 {
color: #00ff9d;
text-shadow: 0 0 15px #00ff9d;
font-size: 2.3em;
margin: 0 0 8px 0;
}
.subtitle {
color: #00cc7a;
font-size: 1.1em;
margin-bottom: 20px;
}
.level-selector {
margin: 20px 0 25px 0;
}
button.level {
padding: 14px 25px;
margin: 0 8px;
font-size: 1.15em;
background: transparent;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 12px;
cursor: pointer;
transition: all 0.3s;
}
button.level:hover, button.level.active {
background: #00ff9d;
color: #000;
box-shadow: 0 0 20px #00ff9d;
}
.score {
font-size: 1.55em;
margin: 15px 0;
text-shadow: 0 0 10px #00ff9d;
}
.progress {
font-size: 1.25em;
color: #00cc7a;
margin-bottom: 25px;
}
.question {
font-size: 2.5em;
margin: 30px 0;
font-weight: bold;
text-shadow: 0 0 20px #00ff9d;
min-height: 85px;
line-height: 1.2;
}
.options {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 14px;
margin: 30px 0;
}
button.option {
padding: 20px 10px;
font-size: 1.5em;
background: #1a1a1a;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 12px;
cursor: pointer;
transition: all 0.3s;
text-shadow: 0 0 8px #00ff9d;
min-height: 78px;
display: flex;
align-items: center;
justify-content: center;
}
button.option:hover {
background: #00ff9d;
color: #000;
transform: scale(1.05);
box-shadow: 0 0 25px #00ff9d;
}
.correct { background: #00ff9d !important; color: #000 !important; }
.incorrect { background: #ff0044 !important; color: white !important; }
.result {
font-size: 1.65em;
margin: 25px 0;
min-height: 60px;
text-shadow: 0 0 15px #00ff9d;
}
.reset-btn {
margin-top: 20px;
padding: 14px 35px;
background: transparent;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 10px;
font-size: 1.1em;
cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>NEON MULTIPLY</h1>
<p class="subtitle">Tablas de Multiplicar&nbsp;</p><p class="subtitle">by Mariano Damian</p>
<div class="level-selector">
<button class="level active" id="btn-easy" onclick="setDifficulty(1)">FÁCIL (1-5)</button>
<button class="level" id="btn-hard" onclick="setDifficulty(2)">DIFÍCIL (1-10)</button>
</div>
<div class="score">Puntuación: <span id="score">0</span> / <span id="total">0</span></div>
<div class="progress">Pregunta <span id="current">1</span> de 10</div>
<div class="question" id="question">¿Cuánto es 4 × 3?</div>
<div class="options" id="options"></div>
<div class="result" id="result"></div>
<button class="reset-btn" onclick="reiniciarJuego()">REINICIAR JUEGO</button>
</div>
<script>
let score = 0;
let currentQuestion = 0;
let totalQuestions = 10;
let correctAnswer = 0;
let answered = false;
let difficulty = 1; // 1 = Fácil (1-5), 2 = Difícil (1-10)
function setDifficulty(nivel) {
difficulty = nivel;
// Actualizar botones activos
document.getElementById("btn-easy").classList.toggle("active", nivel === 1);
document.getElementById("btn-hard").classList.toggle("active", nivel === 2);
reiniciarJuego();
}
function generarPregunta() {
answered = false;
document.getElementById("result").innerHTML = "";
let max = difficulty === 1 ? 5 : 10;
const a = Math.floor(Math.random() * max) + 1;
const b = Math.floor(Math.random() * max) + 1;
correctAnswer = a * b;
document.getElementById("question").textContent = `¿Cuánto es ${a} × ${b}?`;
// Generar 6 opciones
let opciones = [correctAnswer];
while (opciones.length < 6) {
let falsa = Math.floor(Math.random() * (max * max + 30)) + 1;
if (falsa > 0 && !opciones.includes(falsa)) {
opciones.push(falsa);
}
}
// Mezclar
opciones = opciones.sort(() => Math.random() - 0.5);
const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";
opciones.forEach(opcion => {
const btn = document.createElement("button");
btn.textContent = opcion;
btn.className = "option";
btn.onclick = () => verificarRespuesta(opcion, btn);
optionsDiv.appendChild(btn);
});
currentQuestion++;
document.getElementById("current").textContent = currentQuestion;
document.getElementById("total").textContent = currentQuestion;
}
function verificarRespuesta(respuesta, boton) {
if (answered) return;
answered = true;
const botones = document.querySelectorAll(".option");
if (respuesta === correctAnswer) {
score++;
document.getElementById("score").textContent = score;
boton.classList.add("correct");
document.getElementById("result").innerHTML = `<span style="color:#00ff9d">¡CORRECTO! ✅</span>`;
} else {
boton.classList.add("incorrect");
document.getElementById("result").innerHTML = `<span style="color:#ff0044">Incorrecto ❌ La respuesta era <strong>${correctAnswer}</strong></span>`;
botones.forEach(btn => {
if (parseInt(btn.textContent) === correctAnswer) {
btn.classList.add("correct");
}
});
}
// Auto-avanzar después de 1.2 segundos
setTimeout(() => {
if (currentQuestion < totalQuestions) {
generarPregunta();
} else {
// Pantalla final
const porcentaje = Math.round((score / totalQuestions) * 100);
document.getElementById("question").innerHTML = `
<h2>¡JUEGO TERMINADO!</h2>
<p style="font-size:2.6em; margin:25px 0;">${score} / ${totalQuestions}</p>
<p style="font-size:1.7em;">${porcentaje >= 80 ? "¡EXCELENTE! 🔥" : porcentaje >= 60 ? "¡MUY BIEN! 👍" : "¡Sigue practicando!"}</p>
`;
document.getElementById("options").innerHTML = "";
}
}, 1200);
}
function reiniciarJuego() {
score = 0;
currentQuestion = 0;
document.getElementById("score").textContent = "0";
document.getElementById("total").textContent = "0";
generarPregunta();
}
// Iniciar el juego
window.onload = generarPregunta;
</script>
</body></html>
