<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tablas de Multiplicar</title>

<style>
body {
font-family: 'Courier New', Courier, monospace;
background: #0a0a0a;
color: #00ff9d;
margin: 0;
padding: 10px;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}
.container {
width: 100%;
max-width: 400px;
background: #111111;
border: 2px solid #00ff9d;
border-radius: 18px;
padding: 20px 18px;
box-shadow: 0 0 35px rgba(0, 255, 157, 0.25);
text-align: center;
}
h1 {
color: #00ff9d;
text-shadow: 0 0 15px #00ff9d;
font-size: 2.1em;
margin: 5px 0 8px 0;
}
.subtitle {
color: #00cc7a;
font-size: 1.05em;
margin-bottom: 18px;
}
.level-selector {
margin: 15px 0 20px 0;
}
button.level {
padding: 12px 22px;
margin: 0 6px;
font-size: 1.1em;
background: transparent;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 10px;
cursor: pointer;
transition: all 0.3s;
}
button.level:hover, button.level.active {
background: #00ff9d;
color: #000;
box-shadow: 0 0 18px #00ff9d;
}
.score {
font-size: 1.45em;
margin: 12px 0;
text-shadow: 0 0 10px #00ff9d;
}
.progress {
font-size: 1.2em;
color: #00cc7a;
margin-bottom: 20px;
}
.question {
font-size: 2.3em;
margin: 20px 0 25px 0;
font-weight: bold;
text-shadow: 0 0 18px #00ff9d;
min-height: 70px;
line-height: 1.15;
}
.options {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
margin: 20px 0 25px 0;
}
button.option {
padding: 16px 8px;
font-size: 1.45em;
background: #1a1a1a;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 10px;
cursor: pointer;
transition: all 0.3s;
text-shadow: 0 0 6px #00ff9d;
min-height: 68px;
}
button.option:hover {
background: #00ff9d;
color: #000;
transform: scale(1.06);
box-shadow: 0 0 20px #00ff9d;
}
.correct { background: #00ff9d !important; color: #000 !important; }
.incorrect { background: #ff0044 !important; color: white !important; }
.result {
font-size: 1.55em;
margin: 15px 0;
min-height: 50px;
text-shadow: 0 0 12px #00ff9d;
}
.reset-btn {
margin-top: 15px;
padding: 12px 30px;
background: transparent;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 10px;
font-size: 1.05em;
cursor: pointer;
}
/* Ajuste extra para celulares pequeños */
@media (max-width: 380px) {
.container { padding: 18px 15px; }
h1 { font-size: 1.95em; }
.question { font-size: 2.1em; }
button.option { font-size: 1.35em; padding: 14px 6px; }
}
</style>
</head>
<body>
<div class="container">
<h1>NEON MULTIPLY</h1>
<p class="subtitle">Tablas de Multiplicar</p>
<div class="level-selector">
<button class="level active" id="btn-easy" onclick="setDifficulty(1)">FÁCIL (1-5)</button>
<button class="level" id="btn-hard" onclick="setDifficulty(2)">DIFÍCIL (1-10)</button>
</div>
<div class="score">Puntuación: <span id="score">0</span> / <span id="total">0</span></div>
<div class="progress">Pregunta <span id="current">1</span> de 10</div>
<div class="question" id="question">¿Cuánto es 4 × 3?</div>
<div class="options" id="options"></div>
<div class="result" id="result"></div>
<button class="reset-btn" onclick="reiniciarJuego()">REINICIAR JUEGO</button>
</div>
<script>
let score = 0;
let currentQuestion = 0;
let totalQuestions = 10;
let correctAnswer = 0;
let answered = false;
let difficulty = 1; // 1 = Fácil (1-5), 2 = Difícil (1-10)
function setDifficulty(nivel) {
difficulty = nivel;
document.getElementById("btn-easy").classList.toggle("active", nivel === 1);
document.getElementById("btn-hard").classList.toggle("active", nivel === 2);
reiniciarJuego();
}
function generarPregunta() {
answered = false;
document.getElementById("result").innerHTML = "";
let maxTabla = difficulty === 1 ? 5 : 10;
let maxRespuesta = difficulty === 1 ? 50 : 100;
const a = Math.floor(Math.random() * maxTabla) + 1;
const b = Math.floor(Math.random() * maxTabla) + 1;
correctAnswer = a * b;
document.getElementById("question").textContent = `¿Cuánto es ${a} × ${b}?`;
// Generar 6 opciones (respuestas entre 1 y maxRespuesta)
let opciones = [correctAnswer];
while (opciones.length < 6) {
let falsa = Math.floor(Math.random() * maxRespuesta) + 1;
if (falsa !== correctAnswer && !opciones.includes(falsa)) {
opciones.push(falsa);
}
}
opciones = opciones.sort(() => Math.random() - 0.5);
const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";
opciones.forEach(opcion => {
const btn = document.createElement("button");
btn.textContent = opcion;
btn.className = "option";
btn.onclick = () => verificarRespuesta(opcion, btn);
optionsDiv.appendChild(btn);
});
currentQuestion++;
document.getElementById("current").textContent = currentQuestion;
document.getElementById("total").textContent = currentQuestion;
}
function verificarRespuesta(respuesta, boton) {
if (answered) return;
answered = true;
const botones = document.querySelectorAll(".option");
if (respuesta === correctAnswer) {
score++;
document.getElementById("score").textContent = score;
boton.classList.add("correct");
document.getElementById("result").innerHTML = `<span style="color:#00ff9d">¡CORRECTO! ✅</span>`;
} else {
boton.classList.add("incorrect");
document.getElementById("result").innerHTML = `<span style="color:#ff0044">Incorrecto ❌ La respuesta era <strong>${correctAnswer}</strong></span>`;
botones.forEach(btn => {
if (parseInt(btn.textContent) === correctAnswer) {
btn.classList.add("correct");
}
});
}
// Auto-avanzar después de 1.1 segundos (más fluido)
setTimeout(() => {
if (currentQuestion < totalQuestions) {
generarPregunta();
} else {
const porcentaje = Math.round((score / totalQuestions) * 100);
document.getElementById("question").innerHTML = `
<h2>¡JUEGO TERMINADO!</h2>
<p style="font-size:2.4em; margin:20px 0;">${score} / ${totalQuestions}</p>
<p style="font-size:1.6em;">${porcentaje >= 80 ? "¡EXCELENTE! 🔥" : porcentaje >= 60 ? "¡MUY BIEN! 👍" : "¡Sigue practicando!"}</p>
`;
document.getElementById("options").innerHTML = "";
}
}, 1100);
}
function reiniciarJuego() {
score = 0;
currentQuestion = 0;
document.getElementById("score").textContent = "0";
document.getElementById("total").textContent = "0";
generarPregunta();
}
// Iniciar
window.onload = generarPregunta;
</script>
</body></html>
