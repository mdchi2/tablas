<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tablas</title>

<style>
body {
font-family: 'Courier New', Courier, monospace;
background: #0a0a0a;
color: #00ff9d;
margin: 0;
padding: 10px;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}
.container {
width: 100%;
max-width: 520px;
background: #111111;
border: 2px solid #00ff9d;
border-radius: 18px;
padding: 20px 18px;
box-shadow: 0 0 35px rgba(0, 255, 157, 0.25);
text-align: center;
position: relative;
}
h1 {
color: #00ff9d;
text-shadow: 0 0 15px #00ff9d;
font-size: 2.0em; /* Título más pequeño */
margin: 6px 0 8px 0;
}
.subtitle {
color: #00cc7a;
font-size: 1.0em;
margin-bottom: 14px;
}
.level-selector {
margin: 10px 0 18px 0;
display: flex;
justify-content: center;
flex-wrap: wrap;
gap: 5px;
}
/* Botones FÁCIL, DIFÍCIL y REINICIAR - aún más pequeños */
button.level, button.reset-btn {
padding: 6px 12px;
font-size: 0.85em;
background: transparent;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 8px;
cursor: pointer;
transition: all 0.3s;
min-width: 85px;
}
button.level:hover, button.level.active,
button.reset-btn:hover {
background: #00ff9d;
color: #000;
box-shadow: 0 0 18px #00ff9d;
}
.score {
font-size: 1.35em;
margin: 8px 0;
text-shadow: 0 0 10px #00ff9d;
}
.progress {
font-size: 1.15em;
color: #00cc7a;
margin-bottom: 18px;
}
.question {
font-size: 2.05em;
margin: 18px 0 24px 0;
font-weight: bold;
text-shadow: 0 0 18px #00ff9d;
min-height: 65px;
line-height: 1.1;
}
/* Botones de respuestas aún más pequeños */
.options {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
margin: 18px 0 22px 0;
}
button.option {
padding: 12px 6px;
font-size: 1.22em; /* más pequeño */
background: #1a1a1a;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 9px;
cursor: pointer;
transition: all 0.3s;
text-shadow: 0 0 6px #00ff9d;
min-height: 52px;
}
button.option:hover {
background: #00ff9d;
color: #000;
transform: scale(1.04);
box-shadow: 0 0 20px #00ff9d;
}
.correct { background: #00ff9d !important; color: #000 !important; }
.incorrect { background: #ff0044 !important; color: white !important; }
.result {
font-size: 1.55em;
margin: 16px 0;
min-height: 48px;
text-shadow: 0 0 12px #00ff9d;
}
/* PIKACHU EN EL CENTRO DE LA PANTALLA */
#pikachu-overlay {
display: none;
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 1000;
width: 260px;
filter: drop-shadow(0 0 30px #ffff00);
animation: pikachuPop 0.7s ease;
}
@keyframes pikachuPop {
0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
70% { transform: translate(-50%, -50%) scale(1.1); }
100% { transform: translate(-50%, -50%) scale(1); }
}
</style>
</head>
<body>
<div class="container">
<h1>TABLAS</h1>
<p class="subtitle">by Mariano Damian Ver 1.01</p>
<div class="level-selector">
<button class="level active" id="btn-easy" onclick="setDifficulty(1)">FÁCIL (1-5)</button>
<button class="level" id="btn-hard" onclick="setDifficulty(2)">DIFÍCIL (1-10)</button>
<button class="reset-btn" onclick="reiniciarJuego()">REINICIAR</button>
</div>
<div class="score">Puntuación: <span id="score">0</span> / <span id="total">0</span></div>
<div class="progress">Pregunta <span id="current">1</span> de 10</div>
<div class="question" id="question">¿Cuánto es 4 × 3?</div>
<div class="options" id="options"></div>
<div class="result" id="result"></div>
</div>
<!-- Pikachu en el centro de la pantalla --><img id="pikachu-overlay" src="pokemon.jpg" alt="¡Correcto!">

<script>
let score = 0;
let currentQuestion = 0;
let totalQuestions = 10;
let correctAnswer = 0;
let answered = false;
let difficulty = 1;
function setDifficulty(nivel) {
difficulty = nivel;
document.getElementById("btn-easy").classList.toggle("active", nivel === 1);
document.getElementById("btn-hard").classList.toggle("active", nivel === 2);
reiniciarJuego();
}
function generarPregunta() {
answered = false;
document.getElementById("result").innerHTML = "";
document.getElementById("pikachu-overlay").style.display = "none";
let maxTabla = difficulty === 1 ? 5 : 10;
let maxRespuesta = difficulty === 1 ? 50 : 100;
const a = Math.floor(Math.random() * maxTabla) + 1;
const b = Math.floor(Math.random() * maxTabla) + 1;
correctAnswer = a * b;
document.getElementById("question").textContent = `¿Cuánto es ${a} × ${b}?`;
let opciones = [correctAnswer];
while (opciones.length < 6) {
let falsa = Math.floor(Math.random() * maxRespuesta) + 1;
if (falsa !== correctAnswer && !opciones.includes(falsa)) {
opciones.push(falsa);
}
}
opciones = opciones.sort(() => Math.random() - 0.5);
const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";
opciones.forEach(opcion => {
const btn = document.createElement("button");
btn.textContent = opcion;
btn.className = "option";
btn.onclick = () => verificarRespuesta(opcion, btn);
optionsDiv.appendChild(btn);
});
currentQuestion++;
document.getElementById("current").textContent = currentQuestion;
document.getElementById("total").textContent = currentQuestion;
}
function verificarRespuesta(respuesta, boton) {
if (answered) return;
answered = true;
const botones = document.querySelectorAll(".option");
if (respuesta === correctAnswer) {
score++;
document.getElementById("score").textContent = score;
boton.classList.add("correct");
// Mostrar Pikachu en el centro
document.getElementById("pikachu-overlay").style.display = "block";
document.getElementById("result").innerHTML = `<span style="color:#00ff9d">¡CORRECTO! ✅</span>`;
} else {
boton.classList.add("incorrect");
document.getElementById("result").innerHTML = `<span style="color:#ff0044">Incorrecto ❌ La respuesta era <strong>${correctAnswer}</strong></span>`;
botones.forEach(btn => {
if (parseInt(btn.textContent) === correctAnswer) btn.classList.add("correct");
});
}
setTimeout(() => {
document.getElementById("pikachu-overlay").style.display = "none";
if (currentQuestion < totalQuestions) {
generarPregunta();
} else {
const porcentaje = Math.round((score / totalQuestions) * 100);
document.getElementById("question").innerHTML = `
<h2>¡JUEGO TERMINADO!</h2>
<p style="font-size:2.2em; margin:20px 0;">${score} / ${totalQuestions}</p>
<p style="font-size:1.5em;">${porcentaje >= 80 ? "¡EXCELENTE! 🔥" : porcentaje >= 60 ? "¡MUY BIEN! 👍" : "¡Sigue practicando!"}</p>
`;
document.getElementById("options").innerHTML = "";
}
}, 1600);
}
function reiniciarJuego() {
score = 0;
currentQuestion = 0;
document.getElementById("score").textContent = "0";
document.getElementById("total").textContent = "0";
document.getElementById("pikachu-overlay").style.display = "none";
generarPregunta();
}
window.onload = generarPregunta;
</script>
</body></html>
