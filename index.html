<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tablas de Multiplicar</title>

<style>
body {
font-family: 'Courier New', Courier, monospace;
background: #0a0a0a;
color: #00ff9d;
margin: 0;
padding: 10px;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
}
.container {
width: 100%;
max-width: 520px;
background: #111111;
border: 2px solid #00ff9d;
border-radius: 18px;
padding: 22px 20px;
box-shadow: 0 0 35px rgba(0, 255, 157, 0.25);
text-align: center;
}
/* ==================== AJUSTE PARA CELULARES ==================== */
@media (max-width: 480px) {
.container {
max-width: 100%;
padding: 14px 12px; /* menos padding vertical */
margin: 8px 0;
transform: scale(0.97); /* leve reducción general */
}
h1 {
font-size: 1.85em;
margin: 4px 0 6px 0;
}
.subtitle {
font-size: 0.98em;
margin-bottom: 12px;
}
.level-selector {
margin: 10px 0 14px 0;
}
button.level {
padding: 9px 18px;
font-size: 1.02em;
margin: 0 5px;
}
.score {
font-size: 1.35em;
margin: 8px 0;
}
.progress {
font-size: 1.1em;
margin-bottom: 14px;
}
.question {
font-size: 2.05em;
margin: 14px 0 18px 0;
min-height: 58px;
}
.options {
gap: 10px;
margin: 16px 0 18px 0;
}
button.option {
padding: 13px 8px;
font-size: 1.32em;
min-height: 58px; /* reducido */
}
.result {
font-size: 1.45em;
margin: 12px 0;
min-height: 42px;
}
.reset-btn {
margin-top: 12px;
padding: 11px 28px;
font-size: 1.02em;
}
}
/* Ajuste para celulares muy pequeños */
@media (max-width: 380px) {
.container {
padding: 12px 10px;
}
h1 { font-size: 1.75em; }
.question { font-size: 1.95em; }
}
/* Estilos normales (desktop/tablet) */
h1 {
color: #00ff9d;
text-shadow: 0 0 15px #00ff9d;
font-size: 2.2em;
margin: 5px 0 8px 0;
}
.subtitle {
color: #00cc7a;
font-size: 1.05em;
margin-bottom: 18px;
}
.level-selector {
margin: 15px 0 22px 0;
}
button.level {
padding: 12px 24px;
margin: 0 8px;
font-size: 1.12em;
background: transparent;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 10px;
cursor: pointer;
transition: all 0.3s;
}
button.level:hover, button.level.active {
background: #00ff9d;
color: #000;
box-shadow: 0 0 20px #00ff9d;
}
.score {
font-size: 1.5em;
margin: 12px 0;
text-shadow: 0 0 10px #00ff9d;
}
.progress {
font-size: 1.22em;
color: #00cc7a;
margin-bottom: 22px;
}
.question {
font-size: 2.35em;
margin: 22px 0 28px 0;
font-weight: bold;
text-shadow: 0 0 18px #00ff9d;
min-height: 72px;
line-height: 1.15;
}
.options {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 13px;
margin: 22px 0 25px 0;
}
button.option {
padding: 17px 10px;
font-size: 1.48em;
background: #1a1a1a;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 11px;
cursor: pointer;
transition: all 0.3s;
text-shadow: 0 0 6px #00ff9d;
min-height: 70px;
}
button.option:hover {
background: #00ff9d;
color: #000;
transform: scale(1.05);
box-shadow: 0 0 22px #00ff9d;
}
.correct {
background: #00ff9d !important;
color: #000 !important;
}
.incorrect {
background: #ff0044 !important;
color: white !important;
}
.result {
font-size: 1.58em;
margin: 18px 0;
min-height: 52px;
text-shadow: 0 0 12px #00ff9d;
}
.reset-btn {
margin-top: 18px;
padding: 13px 32px;
background: transparent;
color: #00ff9d;
border: 2px solid #00ff9d;
border-radius: 10px;
font-size: 1.08em;
cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>NEON MULTIPLY</h1>
<p class="subtitle">Tablas de Multiplicar</p>
<div class="level-selector">
<button class="level active" id="btn-easy" onclick="setDifficulty(1)">FÁCIL (1-5)</button>
<button class="level" id="btn-hard" onclick="setDifficulty(2)">DIFÍCIL (1-10)</button>
</div>
<div class="score">Puntuación: <span id="score">0</span> / <span id="total">0</span></div>
<div class="progress">Pregunta <span id="current">1</span> de 10</div>
<div class="question" id="question">¿Cuánto es 4 × 3?</div>
<div class="options" id="options"></div>
<div class="result" id="result"></div>
<button class="reset-btn" onclick="reiniciarJuego()">REINICIAR JUEGO</button>
</div>
<script>
// (El script se mantiene igual)
let score = 0;
let currentQuestion = 0;
let totalQuestions = 10;
let correctAnswer = 0;
let answered = false;
let difficulty = 1;
function setDifficulty(nivel) {
difficulty = nivel;
document.getElementById("btn-easy").classList.toggle("active", nivel === 1);
document.getElementById("btn-hard").classList.toggle("active", nivel === 2);
reiniciarJuego();
}
function generarPregunta() {
answered = false;
document.getElementById("result").innerHTML = "";
let maxTabla = difficulty === 1 ? 5 : 10;
let maxRespuesta = difficulty === 1 ? 50 : 100;
const a = Math.floor(Math.random() * maxTabla) + 1;
const b = Math.floor(Math.random() * maxTabla) + 1;
correctAnswer = a * b;
document.getElementById("question").textContent = `¿Cuánto es ${a} × ${b}?`;
let opciones = [correctAnswer];
while (opciones.length < 6) {
let falsa = Math.floor(Math.random() * maxRespuesta) + 1;
if (falsa !== correctAnswer && !opciones.includes(falsa)) {
opciones.push(falsa);
}
}
opciones = opciones.sort(() => Math.random() - 0.5);
const optionsDiv = document.getElementById("options");
optionsDiv.innerHTML = "";
opciones.forEach(opcion => {
const btn = document.createElement("button");
btn.textContent = opcion;
btn.className = "option";
btn.onclick = () => verificarRespuesta(opcion, btn);
optionsDiv.appendChild(btn);
});
currentQuestion++;
document.getElementById("current").textContent = currentQuestion;
document.getElementById("total").textContent = currentQuestion;
}
function verificarRespuesta(respuesta, boton) {
if (answered) return;
answered = true;
const botones = document.querySelectorAll(".option");
if (respuesta === correctAnswer) {
score++;
document.getElementById("score").textContent = score;
boton.classList.add("correct");
document.getElementById("result").innerHTML = `<span style="color:#00ff9d">¡CORRECTO! ✅</span>`;
} else {
boton.classList.add("incorrect");
document.getElementById("result").innerHTML = `<span style="color:#ff0044">Incorrecto ❌ La respuesta era <strong>${correctAnswer}</strong></span>`;
botones.forEach(btn => {
if (parseInt(btn.textContent) === correctAnswer) btn.classList.add("correct");
});
}
setTimeout(() => {
if (currentQuestion < totalQuestions) {
generarPregunta();
} else {
const porcentaje = Math.round((score / totalQuestions) * 100);
document.getElementById("question").innerHTML = `
<h2>¡JUEGO TERMINADO!</h2>
<p style="font-size:2.4em; margin:20px 0;">${score} / ${totalQuestions}</p>
<p style="font-size:1.6em;">${porcentaje >= 80 ? "¡EXCELENTE! 🔥" : porcentaje >= 60 ? "¡MUY BIEN! 👍" : "¡Sigue practicando!"}</p>
`;
document.getElementById("options").innerHTML = "";
}
}, 1100);
}
function reiniciarJuego() {
score = 0;
currentQuestion = 0;
document.getElementById("score").textContent = "0";
document.getElementById("total").textContent = "0";
generarPregunta();
}
window.onload = generarPregunta;
</script>
</body></html>
